<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="forlog_main_container">
      <div class="forlog-container">
        <div class="forlog-img-container">
          <img src="assets/img/login.jpg" alt="login img" />
        </div>
        <div class="forlog-form">
          <p class="welcome-para1">Welcome to the Admin Panel.</p>
          <p class="welcome-para2">Please log in to continue!</p>
          <form
            onsubmit="return validateForm()"
            action="login_page.html"
            method="post"
            class="forlog"
          >
            <div class="input-group">
              <i class="fas fa-phone icon"></i>
              <input type="text" id="phone" placeholder="Phone Number" />
            </div>
            <div class="input-group">
              <i class="fas fa-lock icon"></i>
              <input type="password" id="password" placeholder="Password" />
            </div>
            <button type="submit" class="forlog-btn">LOGIN</button>
          </form>
          <div class="form-links">
            <span>Forgot Password?</span>
            <a href="admin-forgot-password.html">Click Here</a>
            <br /><br />
            <span class="new-reg">New Admin?</span>
            <a href="admin-signup.html" style="font-size: 1rem">Signup Here</a>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
