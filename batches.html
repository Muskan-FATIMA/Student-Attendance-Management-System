<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches</title>
    <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="a-page">
    <aside class="a-sidebar">
      <img
        src="assets/img/su-logo-white.png"
        alt="SU-logo-white"
        class="su-logo-white"
      />
      <div class="line-below-logo"></div>
      <div class="a-sidebar-links">
        <a href="dashboard.html" target="_blank" class="dashboard">
          <i class="fa-solid fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="profile.html" target="_blank" class="profile">
          <i class="fa-solid fa-user"></i>
          <span>Manage Your Profile</span>
        </a>
        <a href="teachers.html" target="_blank" class="teachers">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span>Teachers</span>
        </a>
        <a href="batches.html" class="batches">
          <i class="fa-regular fa-calendar-plus" style="color: #fdb813"></i>
          <span style="color: #fdb813">Batches</span>
        </a>
        <a href="courses.html" target="_blank" class="courses">
          <i class="fa-solid fa-bookmark"></i>
          <span>Courses</span>
        </a>
        <a href="sections.html" target="_blank" class="sections">
          <i class="fa-solid fa-table-columns"></i>
          <span>Sections</span>
        </a>
        <a href="subjects.html" target="_blank" class="subjects">
          <i class="fa-solid fa-book-open"></i>
          <span>Subjects</span>
        </a>
        <a href="students.html" target="_blank" class="students">
          <i class="fa-solid fa-graduation-cap"></i>
          <span>Students</span>
        </a>
        <a
          href="attendance-record.html"
          target="_blank"
          class="attendance-record"
        >
          <i class="fa-regular fa-clipboard"></i>
          <span>Attendance Record</span>
        </a>
        <div class="line-above-logout"></div>
        <a href="login.html" target="_blank" class="logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </div>
    </aside>
    <div class="a-main">
      <div class="a-heading">
        <h1>BATCHES</h1>
      </div>
      <div class="batches-main-container">
        <div class="batches-list-container">
          <div class="batch-header">
            <div class="heading">
              <h1>LIST OF ALL BATCHES</h1>
            </div>
            <div class="add-new-batch-btn">
              <i class="fa-solid fa-square-plus"></i>
              ADD NEW BATCH
            </div>
          </div>
          <table border="3" class="batch-table">
            <tr>
              <th>Batch_ID</th>
              <th>Batch Year</th>
              <th colspan="2">Actions</th>
            </tr>
            <tr>
              <td>001</td>
              <td>2021</td>
              <td><i class="fa-solid fa-pencil"></i></td>
              <td><i class="fa-solid fa-trash-can"></i></td>
            </tr>
            <tr>
              <td>002</td>
              <td>2022</td>
              <td><i class="fa-solid fa-pencil"></i></td>
              <td><i class="fa-solid fa-trash-can"></i></td>
            </tr>
          </table>
        </div>
        <div class="add-new-batch-container">
          <div class="heading">
            <h1><i class="fa-solid fa-square-plus"></i>ADD NEW BATCH</h1>
          </div>
          <form action="">
            <label for="batch_year">Batch Year:</label>
            <br />
            <input type="number" id="batch_year" name="batch_year" />
            <br />
            <div class="btns">
              <button class="add-btn">ADD</button>
              <button class="cancel-btn">CANCEL</button>
            </div>
          </form>
        </div>
      </div>
      </div>
      <script src="index.js"></script>
</body>
</html>
