<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="a-page">
      <aside class="a-sidebar">
        <img
          src="assets/img/su-logo-white.png"
          alt="SU-logo-white"
          class="su-logo-white"
        />
        <div class="line-below-logo"></div>
        <div class="a-sidebar-links">
          <a href="teacher-profile.html" class="teacher-profile">
            <i class="fa-solid fa-user" style="color: #fdb813"></i>
            <span style="color: #fdb813">Manage Your Profile</span>
          </a>
          <a
            href="mark-attendance.html"
            target="_blank"
            class="mark-attendance"
          >
            <i class="fa-regular fa-square-check"></i>
            <span>Mark Attendance</span>
          </a>
          <a
            href="teacher-attendance-record.html"
            target="_blank"
            class="attendance-record"
          >
            <i class="fa-regular fa-clipboard"></i>
            <span>Attendance Record</span>
          </a>
          <div class="line-above-logout"></div>
          <a href="login.html" target="_blank" class="logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>
      <div class="a-main">
        <div class="a-heading">
          <h1>MY PROFILE</h1>
        </div>
        <div class="profile-main">
          <div class="profile-container">
            <div class="profile-head">
              <div class="profile-name">
                <div class="profile-img">
                  <i class="fa-solid fa-user fa-2x"></i>
                </div>
                <h1>PRASHANT KUMAR</h1>
              </div>
              <i class="fa-solid fa-pencil profile-edit-btn"></i>
            </div>
            <div class="profile-content">
              <table class="profile-table">
                <tr>
                  <td class="profile-table-main">Phone No.:</td>
                  <td class="profile-table-data">123456789</td>
                </tr>
                <tr>
                  <td class="profile-table-main">Email ID:</td>
                  <td class="profile-table-data">pk123@gmail.com</td>
                </tr>
              </table>
              <button class="password-change-btn">CHANGE PASSWORD</button>
            </div>
          </div>
          <div class="profile-edit-popup-box">
            <div class="heading">
              <h1>UPDATE DETAILS</h1>
            </div>
            <form action="">
              <label for="phone">Phone No.:</label>
              <br />
              <input type="tel" id="phone" name="phone" />
              <br />
              <label for="email">Email:</label>
              <br />
              <input type="email" id="email" name="email" />
              <br />
              <div class="btns">
                <button class="update-btn">UPDATE</button>
                <button class="cancel-btn">CANCEL</button>
              </div>
            </form>
          </div>
          <div class="password-change-popup-box">
            <div class="heading">
              <h1>CHANGE PASSWORD</h1>
            </div>
            <form action="">
              <label for="email">Email:</label>
              <br />
              <input type="email" id="email" name="email" />
              <br />
              <label for="password">Old Password:</label>
              <br />
              <input type="password" id="password1" name="password1" />
              <br />
              <label for="password">New Password:</label>
              <br />
              <input type="password" id="password2" name="password2" />
              <br />
              <div class="btns">
                <button class="update-btn">UPDATE</button>
                <button class="cancel-btn">CANCEL</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
