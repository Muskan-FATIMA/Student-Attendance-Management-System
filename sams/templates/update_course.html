{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Course</title>
    <link rel="icon" href="{% static "images/favicon.png" %}" type="image/png">
    <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="{% static "css/style.css" %}" />
  <link rel="stylesheet" href="{% static "css/responsive.css" %}" />
</head>
<body>
  <div class="a-page">
    <aside class="a-sidebar">
      <img
      src="{% static "images/su-logo-white.png" %}"
      alt="SU-logo-white"
        class="su-logo-white"
      />
      <div class="line-below-logo"></div>
      <div class="a-sidebar-links">
        <a 
        href="{% url "admin_profile" %}" 
        target="_blank" class="profile">
          <i class="fa-solid fa-user"></i>
          <span>Manage Your Profile</span>
        </a> 
        <a 
        href="{% url "dashboard" %}" 
        target="_blank" class="dashboard">
          <i class="fa-solid fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        
        <a 
        href="{% url "manage_teachers" %}" 
        target="_blank" class="teachers">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span>Teachers</span>
        </a>
        <a 
        href="{% url "manage_batches" %}" 
        target="_blank" class="batches">
          <i class="fa-regular fa-calendar-plus"></i>
          <span>Batches</span>
        </a>
        <a 
        href="{% url "manage_courses" %}" 
        class="courses">
          <i class="fa-solid fa-bookmark" style="color: #fdb813"></i>
          <span style="color: #fdb813">Courses</span>
        </a>
        <a 
        href="{% url "manage_sections" %}" 
        target="_blank" class="sections">
          <i class="fa-solid fa-table-columns"></i>
          <span>Sections</span>
        </a>
        <a 
        href="{% url "manage_subjects" %}" 
        target="_blank" class="subjects">
          <i class="fa-solid fa-book-open"></i>
          <span>Subjects</span>
        </a>
        <a 
        href="{% url "manage_students" %}" 
        target="_blank" class="students">
          <i class="fa-solid fa-graduation-cap"></i>
          <span>Students</span>
        </a>
        <a
          href="{% url "manage_attendance_record" %}"
          target="_blank"
          class="attendance-record"
        >
          <i class="fa-regular fa-clipboard"></i>
          <span>Attendance Record</span>
        </a>
        <div class="line-above-logout"></div>
        <a 
        href="{% url "logout" %}" 
        class="logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </a>
        <form action="{% url 'delete_admin_account' %}" method="POST" onsubmit="return confirm('Are you sure you want to delete your account?');">
          {% csrf_token %}
          <a class="delete-btn-acnhortag">
          <i class="fa-solid fa-trash"></i>
         <span> <button type="submit" class="delete-btn">Delete Account</button></span>
        </a>
      </form>
      </div>
    </aside>
    <div class="a-main">
      <div class="a-heading">
        <h1>COURSES</h1>
      </div>
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
            <button class="close-btn" onclick="this.parentElement.style.display='none';"><i class="fa-solid fa-xmark"></i></button>
            <p>{{ message }}</p>
          </div>
        {% endfor %}
      </div>
    {% endif %}
      <div class="courses-main-container">
        <div class="add-new-course-container" style="display: flex">
          <div class="heading">
            <h1><i class="fa-solid fa-pencil"></i>UPDATE COURSE</h1>
          </div>
          <form action="?batch_id={{ course.batch.id }}" method="POST">
            {% csrf_token %}
            <label for="course_name">Course Name:</label>
            <br />
            <input type="text" id="course_name" name="course_name" value="{{course.course_name}}" />
            <br />
            <label for="course_duration">Course Duration:</label>
            <br />
            <input type="number" id="course_duration" name="course_duration" value="{{course.course_duration}}" />
            <br />
            <label for="total_semesters">Total Semesters:</label>
            <br />
            <input type="number" id="total_semesters" name="total_semesters" value="{{course.total_semesters}}" />
            <br />
            <div class="btns">
                <button type="submit" class="add-btn">UPDATE</button>
                <a href="{% url 'manage_courses' %}" class="cancel-btn">CANCEL</a>
            </div>
          </form>
        </div>
      </div>
      </div>
      <script src="{% static "js/index.js" %}" ></script>
</body>
</html>
