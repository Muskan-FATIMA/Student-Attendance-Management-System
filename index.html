<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Srinath University Attendance Management System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Split Animation -->
    <div class="split-container">
      <div class="split left"></div>
      <div class="split right"></div>
    </div>

    <!-- LoginAs Page -->
    <div class="loginAs-page" id="loginAsPage">
      <header class="loginAs-page-header">
        <div class="logo-container">
          <img src="assets/img/logo.jpg" alt="University Logo" class="logo" />
        </div>
        <h1>ATTENDANCE MANAGEMENT SYSTEM</h1>
      </header>
      <div class="loginAs-page-body">
        <h1>LOGIN AS <i class="fa-solid fa-arrow-right-to-bracket"></i></h1>
        <div class="loginAs-page-btns">
          <button id="adminBtn">ADMIN</button>
          <button id="teacherBtn">TEACHER</button>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
