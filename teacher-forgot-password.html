<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Forgot Password Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="forlog_main_container">
      <div class="forlog-container">
        <div class="forlog-img-container">
          <img src="assets/img/forgot.jpg" alt="faculty forgot Illustration" />
        </div>
        <div class="forlog-form">
          <div class="forgot-icon">
            <i class="fas fa-exclamation-circle"></i>
          </div>
          <h3>Forgot Password</h3>
          <p>
            Enter your email and we'll send you a link to reset your password
          </p>
          <form
            onsubmit="return validateForm()"
            action="#"
            method="post"
            class="signup"
          >
            <div class="input-group">
              <i class="fas fa-envelope icon"></i>
              <input type="email" id="email" placeholder="Email" required />
            </div>

            <button type="submit" class="forlog-btn">SUBMIT</button>
          </form>
          <div class="form-links">
            <a href="teacher-login.html" id="back-to-login"
              >&lt; &nbsp; Back To Login</a
            >
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
