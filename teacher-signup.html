<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Sign Up Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="signup_main_container">
      <div class="signup-container">
        <div class="signup-form">
          <p class="welcome-para1">Welcome, Teacher.</p>
          <p class="welcome-para2">Register Now!</p>
          <form
            onsubmit="return validateForm()"
            action="login_page.html"
            method="post"
            class="signup"
          >
            <div class="input-group">
              <i class="fas fa-phone icon"></i>
              <input
                type="text"
                id="phone"
                placeholder="Phone Number"
                required
              />
            </div>
            <div class="input-group">
              <i class="fas fa-envelope icon"></i>
              <input type="email" id="email" placeholder="Email" required />
            </div>

            <div class="input-group">
              <i class="fas fa-lock icon"></i>
              <input
                type="password"
                id="password"
                placeholder="Password"
                required
              />
            </div>
            <div class="input-group">
              <i class="fas fa-lock icon"></i>
              <input
                type="password"
                id="password"
                placeholder="Re-enter Password"
                required
              />
            </div>
            <button type="submit" class="signup-btn">SIGN UP</button>
          </form>
          <div class="form-links">
            <span>Already have an account?</span>
            <a href="teacher-login.html">Login Here</a>
          </div>
        </div>
        <div class="signup-img-container">
          <img src="assets/img/signup.png" alt="signup-img-container" />
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
