<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Attendance</title>
    <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="a-page">
      <aside class="a-sidebar">
        <img
          src="assets/img/su-logo-white.png"
          alt="SU-logo-white"
          class="su-logo-white"
        />
        <div class="line-below-logo"></div>
        <div class="a-sidebar-links">
          <a href="teacher-profile.html" target="_blank" class="teacher-profile">
            <i class="fa-solid fa-user"></i>
            <span>Manage Your Profile</span>
          </a>
          <a href="mark-attendance.html" class="mark-attendance">
            <i class="fa-regular fa-square-check" style="color: #fdb813"></i>
            <span style="color: #fdb813">Mark Attendance</span>
          </a>
          <a href="teacher-attendance-record.html" target="_blank" class="teacher-attendance-record">
            <i class="fa-regular fa-clipboard"></i>
            <span>Attendance Record</span>
          </a>
          <div class="line-above-logout"></div>
          <a href="login.html" target="_blank" class="logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span>Logout</span>
          </a>
        </div>
      </aside>
      <div class="a-main">
        <div class="a-heading">
          <h1>MARK ATTENDANCE</h1>
        </div>
        <div class="m-a-main-container">
            <div class="m-a-list-container">
          <div class="dropdown-section">
            <div class="batch">
              <label for="choose_batch">Choose Batch</label>
              <select name="choose_batch" id="choose_batch">
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
              </select> 
            </div>
            <div class="course">
              <label for="choose_course">Choose Course</label>
              <select name="choose_course" id="choose_course">
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
              </select> 
            </div>
            <div class="semester">
            <label for="choose_semester">Choose Semester</label>
              <select name="choose_semester" id="choose_semester">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select> 
            </div>
            <div class="section">
              <label for="choose_section">Choose Section</label>
                <select name="choose_section" id="choose_section">
                  <option value="A">A</option>
                  <option value="B">B</option>
                </select> 
              </div>
              <div class="subject">
                <label for="choose_subject">Choose Subject</label>
                  <select name="choose_subject" id="choose_subject">
                    <option value="Fundamentals Of Computer">Fundamentals Of Computer</option>
                    <option value="C Language">C Language</option>
                  </select> 
              </div>
          </div>
          <div class="m-a-header">
              <h1>MARK TODAY'S ATTENDANCE - BCA(2021) 1ST SEMESTER (A)<br>"FUNDAMENTALS OF COMPUTER</h1>
          </div>
         <table border="3" class="m-a-table">
            <tr>
              <th>S.No.</th>
              <th>Student Name</th>
              <th>Student Roll No.</th>
              <th>Present/Absent</th>
            </tr>
            <tr>
              <td>001</td>
              <td>Rahul Kumar</td>
              <td>01</td>
              <td><input type="checkbox"></td>
            </tr>
            <tr>
              <td>002</td>
              <td>Roshni Kumari</td>
              <td>02</td>
              <td><input type="checkbox"></td>
            </tr>
          </table>
          <!-- <div class="summary-and-submit">
            <div class="summary">
                TOTAL STUDENTS - 50<br>TOTAL PRESENT - 37
            </div> -->
          <button class="submit-btn">
            SUBMIT
          </button>
          <!-- </div> -->
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
