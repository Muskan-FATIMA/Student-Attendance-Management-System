<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects</title>
    <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="a-page">
    <aside class="a-sidebar">
      <img
        src="assets/img/su-logo-white.png"
        alt="SU-logo-white"
        class="su-logo-white"
      />
      <div class="line-below-logo"></div>
      <div class="a-sidebar-links">
        <a href="dashboard.html" target="_blank" class="dashboard">
          <i class="fa-solid fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="profile.html" target="_blank" class="profile">
          <i class="fa-solid fa-user"></i>
          <span>Manage Your Profile</span>
        </a>
        <a href="teachers.html" target="_blank" class="teachers">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span>Teachers</span>
        </a>
        <a href="batches.html" target="_blank" class="batches">
          <i class="fa-regular fa-calendar-plus"></i>
          <span>Batches</span>
        </a>
        <a href="courses.html" target="_blank" class="courses">
          <i class="fa-solid fa-bookmark"></i>
          <span>Courses</span>
        </a>
        <a href="sections.html" target="_blank" class="sections">
          <i class="fa-solid fa-table-columns"></i>
          <span>Sections</span>
        </a>
        <a href="subjects.html" class="subjects">
          <i class="fa-solid fa-book-open" style="color: #fdb813"></i>
          <span style="color: #fdb813">Subjects</span>
        </a>
        <a href="students.html" target="_blank" class="students">
          <i class="fa-solid fa-graduation-cap"></i>
          <span>Students</span>
        </a>
        <a
          href="attendance-record.html"
          target="_blank"
          class="attendance-record"
        >
          <i class="fa-regular fa-clipboard"></i>
          <span>Attendance Record</span>
        </a>
        <div class="line-above-logout"></div>
        <a href="login.html" target="_blank" class="logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </div>
    </aside>
    <div class="a-main">
      <div class="a-heading">
        <h1>SUBJECTS</h1>
      </div>
      <div class="subjects-main-container">
        <div class="subjects-list-container">
          <div class="dropdown-section">
            <div class="batch">
              <label for="choose_batch">Choose Batch</label>
              <select name="choose_batch" id="choose_batch">
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
              </select> 
            </div>
            <div class="course">
              <label for="choose_course">Choose Course</label>
              <select name="choose_course" id="choose_course">
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
              </select> 
            </div>
            <div class="semester">
            <label for="choose_semester">Choose Semester</label>
              <select name="choose_semester" id="choose_semester">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select> 
            </div>
          </div>
          <div class="subject-header">
            <div class="heading">
              <h1>LIST OF ALL SUBJECTS - BCA(2021) 1ST SEMESTER</h1>
            </div>
            <div class="add-new-subject-btn">
              <i class="fa-solid fa-square-plus"></i>
              ADD NEW SUBJECT
            </div>
          </div>
         <table border="3" class="subject-table">
            <tr>
              <th>Subject_Id</th>
              <th>Subject Name</th>
              <th colspan="2">Actions</th>
            </tr>
            <tr>
              <td>001</td>
              <td>Fundamentals Of Computer</td>
              <td><i class="fa-solid fa-pencil"></i></td>
              <td><i class="fa-solid fa-trash-can"></i></td>
            </tr>
            <tr>
              <td>002</td>
              <td>C Language</td>
              <td><i class="fa-solid fa-pencil"></i></td>
              <td><i class="fa-solid fa-trash-can"></i></td>
            </tr>
          </table>
        </div>
        <div class="add-new-subject-container">
          <div class="heading">
            <h1><i class="fa-solid fa-square-plus"></i>ADD NEW SUBJECT</h1>
          </div>
          <form action="">
            <label for="subejct_name">Subject Name:</label>
            <br />
            <input type="text" id="subejct_name" name="subejct_name" />
            <br />
            <div class="btns">
              <button class="add-btn">ADD</button>
              <button class="cancel-btn">CANCEL</button>
            </div>
          </form>
        </div>
      </div>
      </div>
      <script src="index.js"></script>
</body>
</html>
